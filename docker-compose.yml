include:
  - docker-compose.deps.yml 

x-app-env: &app-env
  OTEL_SERVICE_NAME: todoapp
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://prometheus:9090/api/v1/otlp/v1/metrics
  OTEL_SEMCONV_STABILITY_OPT_IN: database
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: todoappdb
  VAULT_ADDR: http://vault:8200
  VAULT_TOKEN: root-token
  VAULT_MOUNT_PATH: secret
  VAULT_SECRET_PATH: todoapp
  PUBSUB_EMULATOR_HOST: pubsub-emulator:8681
  PUBSUB_PROJECT_ID: local-dev
  PUBSUB_TOPIC_ID: Todo
  TODO_EVENTS_SUBSCRIPTION_ID: todo_summary_generator
  CHAT_EVENTS_SUBSCRIPTION_ID: chat_message_summary_generator
  CHAT_TITLE_EVENTS_SUBSCRIPTION_ID: chat_message_title_generator
  ACTION_APPROVAL_EVENTS_SUBSCRIPTION_ID: action_approval_dispatcher
  SUMMARY_BATCH_INTERVAL: 1s
  
x-assistant-llm-env: &assistant-llm-env
  LLM_MODEL_HOST: http://model-runner.docker.internal
  LLM_SUMMARY_MODEL: qwen3:4B-F16
  LLM_CHAT_SUMMARY_MODEL: qwen3:4B-F16
  LLM_CHAT_TITLE_MODEL: qwen3:4B-F16

x-encoder-llm-env: &encoder-llm-env
  LLM_EMBEDDING_MODEL_HOST: http://model-runner.docker.internal
  LLM_EMBEDDING_MODEL: embeddinggemma:300M-Q8_0

x-http-api-env: &http-api-env
  MCP_GATEWAY_ENDPOINT: http://mcp-gateway:8811

x-app-depends: &app-depends
  jaeger:
    condition: service_started
  postgres:
    condition: service_healthy
  vault:
    condition: service_healthy
  pubsub-emulator:
    condition: service_healthy
  prometheus:
    condition: service_started
  mcp-gateway:
    condition: service_started

services:
  todoapp:
    profiles: ["monolithic"]
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["/monolithic"]
    ports:
      - "8080:8080"
      - "8085:8085"
    environment:
      <<: [*app-env, *assistant-llm-env, *encoder-llm-env, *http-api-env]
      OTEL_SERVICE_NAME: todoapp
    models:
      - qwen3
      - embeddinggemma
    depends_on: *app-depends

  http-api:
    profiles: ["split"]
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        APP_CMD: http-api
        VITE_API_BASE_URL: http://localhost:18080
        VITE_GRAPHQL_ENDPOINT: http://localhost:18085/v1/query
    command: ["/http-api"]
    ports:
      - "18080:8080"
    environment:
      <<: [*app-env, *assistant-llm-env, *encoder-llm-env, *http-api-env]
      OTEL_SERVICE_NAME: http-api
    models:
      - qwen3
      - embeddinggemma
    depends_on: *app-depends

  graphql-api:
    profiles: ["split"]
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        APP_CMD: graphql-api
    command: ["/graphql-api"]
    ports:
      - "18085:8085"
    environment:
      <<: [*app-env, *encoder-llm-env]
      OTEL_SERVICE_NAME: graphql-api
    models:
      - embeddinggemma
    depends_on: *app-depends

  message-relay:
    profiles: ["split"]
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        APP_CMD: message-relay
    command: ["/message-relay"]
    environment:
      <<: [*app-env]
      OTEL_SERVICE_NAME: message-relay
    depends_on: *app-depends

  board-summary-generator:
    profiles: ["split"]
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        APP_CMD: board-summary-generator
    command: ["/board-summary-generator"]
    environment:
      <<: [*app-env, *assistant-llm-env]
      OTEL_SERVICE_NAME: board-summary-generator
    models:
      - qwen3
    depends_on: *app-depends

  chat-summary-generator:
    profiles: ["split"]
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        APP_CMD: chat-summary-generator
    command: ["/chat-summary-generator"]
    environment:
      <<: [*app-env, *assistant-llm-env]
      OTEL_SERVICE_NAME: chat-summary-generator
    models:
      - qwen3
    depends_on: *app-depends

  conversation-title-generator:
    profiles: ["split"]
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        APP_CMD: conversation-title-generator
    command: ["/conversation-title-generator"]
    environment:
      <<: [*app-env, *assistant-llm-env]
      OTEL_SERVICE_NAME: conversation-title-generator
    models:
      - qwen3
    depends_on: *app-depends
  
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "6831:6831/udp"
      - "16686:16686"
      - "4318:4318"


  prometheus:
    image: prom/prometheus:v3.9.1
    command:
      - "--web.enable-otlp-receiver"
      - "--config.file=/etc/prometheus/prometheus.yml"
    entrypoint:
      - sh
      - -c
      - |
        cat <<EOF > /etc/prometheus/prometheus.yml
        global:
          scrape_interval: 15s
        EOF
        /bin/prometheus --web.enable-otlp-receiver --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_started
