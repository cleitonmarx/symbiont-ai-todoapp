tools:
  - name: search
    description: Search the web with DuckDuckGo and return concise result snippets with source links.
    status_message: 🔎 Searching on the web...
    input:
      type: object
      fields:
        query:
          type: string
          description: Search query in natural language.
          required: true
        max_results:
          type: integer
          description: Maximum number of search results to return. Default to 2 for normal requests. Use 3 only when needed. Use larger values only when the user explicitly asks for broad research.
          required: false

  - name: fetch_content
    status_message: 📄 Fetching page content...
    description: Fetch and extract readable text content a web search result URL.
    approval:
      required: true
      title: Confirm URL content fetch
      description: This action fetches content from an external URL. Please confirm.
      preview_fields:
        - url
      timeout: 90s
    input:
      type: object
      fields:
        url:
          type: string
          description: Fully qualified http or https URL to fetch.
          required: true
        max_length:
          type: integer
          description: Maximum number of characters returned from extracted content. Default to 200 for normal requests. Use up to 300 only when necessary. Use larger values only when the user explicitly asks for detailed extraction.
          required: false
