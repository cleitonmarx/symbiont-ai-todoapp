apiVersion: v1
kind: Service
metadata:
  name: {{ include "todoapp.mcpServiceName" . }}
  labels:
    {{- include "todoapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
spec:
  selector:
    {{- include "todoapp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
  ports:
    - name: http
      port: {{ .Values.mcp.servicePort }}
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "todoapp.mcpServiceName" . }}
  labels:
    {{- include "todoapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "todoapp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp-gateway
  template:
    metadata:
      labels:
        {{- include "todoapp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp-gateway
    spec:
      containers:
        - name: mcp-gateway
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - {{ printf "--transport=%s" .Values.mcp.transport | quote }}
            - {{ printf "--port=%v" .Values.mcp.servicePort | quote }}
            - {{ printf "--servers=%s" .Values.mcp.servers | quote }}
            {{- range .Values.mcp.tools }}
            - {{ printf "--tools=%s" . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.servicePort }}
          {{- if .Values.mcp.dockerSocket.enabled }}
          volumeMounts:
            - name: docker-socket
              mountPath: {{ .Values.mcp.dockerSocket.mountPath }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.mcp | nindent 12 }}
      {{- if .Values.mcp.dockerSocket.enabled }}
      volumes:
        - name: docker-socket
          hostPath:
            path: {{ .Values.mcp.dockerSocket.hostPath }}
            type: Socket
      {{- end }}
