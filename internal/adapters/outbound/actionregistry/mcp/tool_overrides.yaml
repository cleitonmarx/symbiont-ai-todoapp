tools:
  - name: search
    description: Search the web with DuckDuckGo and return concise result snippets with source links.
    status_message: 🔎 Searching on the web...
    input:
      type: object
      fields:
        query:
          type: string
          description: Search query in natural language.
          required: true
        max_results:
          type: integer
          description: Maximum number of search results to return. Default to 2 for normal requests. Use 3 only when needed. Use larger values only when the user explicitly asks for broad research.
          required: false

  - name: fetch_content
    status_message: 📄 Fetching page content...
    description: Fetch and extract readable text content a web search result URL.
    approval:
      required: true
      title: Confirm URL content fetch
      description: This action fetches content from an external URL. Please confirm.
      preview_fields:
        - url
      timeout: 90s
    input:
      type: object
      fields:
        url:
          type: string
          description: Fully qualified http or https URL to fetch.
          required: true
        max_length:
          type: integer
          description: Maximum number of characters returned from extracted content. Default to 200 for normal requests. Use up to 300 only when necessary. Use larger values only when the user explicitly asks for detailed extraction.
          required: false

  - name: execute_code
    status_message: 🧮 Running deterministic code...
    description: Execute short self-contained Python code for deterministic calculations, grouping, validation, and data shaping.
    input:
      type: object
      fields:
        code:
          type: string
          description: Python code to execute. Make it self-contained and inline the data you need directly in the script unless another tool field explicitly carries variables. End by evaluating `result` or another final expression to return the computed value.
          required: true
        session_id:
          type: integer
          description: Optional interpreter session ID. Omit it on the first call. Reuse the returned session_id only when you intentionally want to continue the same Python session in a later call.
          required: false
